name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore CommandFlow.slnx

      - name: Build
        run: dotnet build CommandFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/CommandFlow.UnitTests/CommandFlow.UnitTests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: tests/CommandFlow.UnitTests/TestResults/**/coverage.cobertura.xml
          retention-days: 30

