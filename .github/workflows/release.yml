name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore CommandFlow.slnx

      - name: Build
        run: dotnet build CommandFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/CommandFlow.UnitTests/CommandFlow.UnitTests.csproj --configuration Release --no-build --verbosity normal --settings coverage.runsettings

      - name: Pack CommandFlow
        run: dotnet pack src/CommandFlow/CommandFlow.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack CommandFlow.DependencyInjection
        run: dotnet pack src/CommandFlow.DependencyInjection/CommandFlow.DependencyInjection.csproj --configuration Release --no-build --output ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./nupkgs/*

