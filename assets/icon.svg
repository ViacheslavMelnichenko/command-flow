<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg5)"/>
  <!-- Branching flow: one input splits into two outgoing arrows -->
  <circle cx="34" cy="64" r="12" fill="white" opacity="0.9"/>
  <!-- Top arrow -->
  <path d="M48 58 Q66 50 82 40" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <polygon points="100,40 82,32 82,48" fill="white" opacity="0.9" transform="rotate(-27 82 40)"/>
  <!-- Bottom arrow -->
  <path d="M48 70 Q66 78 82 88" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <polygon points="100,88 82,80 82,96" fill="white" opacity="0.9" transform="rotate(27 82 88)"/>
</svg>

